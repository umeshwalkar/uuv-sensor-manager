; My Sensor Manager configuration — INI format
; Equivalent to sensor_config.json — use whichever you prefer.

; ── Debug / logging ───────────────────────────────────────────────────────────
; enabled: true enables INFO/DEBUG output; WARN/ERROR always print regardless.
; level:   debug | info | warning | error  (effective only when enabled=true)
[debug]
enabled=true
level=debug

; ── MQTT broker ───────────────────────────────────────────────────────────────
[mqtt]
enabled=true
broker=localhost
port=1883
client_id=sensor_manager
keepalive=60
qos=1
retain=false

[mqtt.topics]
sensor=uuv/sensor
status=sensor/status

; ── SVP application settings ──────────────────────────────────────────────────
[sensor]
publish_interval_ms=1000
data_timeout_sec=2.0
status_interval_sec=10
publish_raw_data=false
; Set to true to re-send init commands after every reconnect
send_init_on_reconnect=false

; ── Init commands (sent to device on startup / connect) ───────────────────────
; Keys are ordering labels — values are VALEPORT command strings.
; Each command is sent with CR+LF appended, with 150 ms between them.
[sensor.init_commands]
1=$020;0
2=$022;0
3=$024;0
4=$026;0
5=$030;0
6=$032;0
7=$601;0
8=$034;0
9=$605;0
10=$016;4

; ── SVP device connection ──────────────────────────────────────────────────────
[sensor.device]
name=sensor_device
enabled=true
data_timeout_sec=2.0

; --- TCP client: connect to SVP device (default) ---
type=tcp_client
host=192.168.1.100
port=4006
connect_timeout_sec=5
reconnect_delay_sec=3
read_timeout_ms=1000
buffer_size_bytes=512

; --- TCP server: wait for device to connect ---
; type=tcp_server
; bind_host=0.0.0.0
; bind_port=4006

; --- UDP server: bind and wait for device to push data ---
; type=udp_server
; bind_host=0.0.0.0
; bind_port=9005
; host=192.168.1.100    ; set host+port to enable sending commands back via UDP
; port=4006

; --- Serial RS232 ---
; type=serial
; serial_port=/dev/ttyUSB0
; serial_baud=19200
; serial_data_bits=8
; serial_stop_bits=1
; serial_parity=N
